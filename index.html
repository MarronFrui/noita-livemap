<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noita Live Map</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body,
      #app {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #noitamap-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
      #telemetry-overlay {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        padding: 12px 16px;
        border-radius: 8px;
        min-width: 220px;
        pointer-events: none;
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      #telemetry-overlay h1 {
        margin: 0 0 8px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #aaa;
      }
      #telemetry-overlay p {
        margin: 4px 0;
        font-size: 13px;
      }
      #telemetry-overlay .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: #7ee787;
      }
      #telemetry-overlay .warning {
        color: #f85149;
        font-weight: 600;
      }
      #telemetry-overlay #status {
        margin-top: 8px;
        font-size: 11px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <iframe id="noitamap-frame" src="/noitamap/index.html"></iframe>
      <div id="telemetry-overlay">
        <h1>Live Telemetry</h1>
        <p>Seed: <span class="value" id="seed">-</span></p>
        <p>Biome: <span class="value" id="biome">-</span></p>
        <p>Position: <span class="value" id="position">-</span></p>
        <p id="seed-warning" class="warning" style="display: none;">Current seed differs from map seed</p>
        <p id="status">Waiting for bridge…</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
